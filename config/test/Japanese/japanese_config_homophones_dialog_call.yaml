# Japanese Homophone Error Correction - PIPELINE MODE
path:
  test_data: D:\VJ\LLM-ASR-Error-Correction\data\japanese\test\test.txt
  label: D:\VJ\LLM-ASR-Error-Correction\data\japanese\label\label.txt

# LLM backend

api_key: "sk-Dna-Jok0OWWkqKr-KkqX4g"
base_url: https://litellm-ai.prod.vi-jp-te.info/v1
model: javis/Qwen3-14B-AWQ
use_groq_sdk: false
temperature: 0.0
top_p: 0.4
max_completion_tokens: 800
request_timeout: 90
max_workers: 1
max_api_retries: 2
initial_backoff: 2.0
backoff_multiplier: 2.0
max_backoff: 60.0
disable_llm_on_rate_limit: true
server_safe_mode: true
max_samples: 0
strip_punctuation: true
min_request_interval_sec: 0.5
max_concurrent_requests: 1
safe_max_tokens_cap: 800

# Dictionary source
homophones_file: data/japanese/dictionary/homophones.json

# Pipeline switches (Rule-based + AI recheck + no-dict fallback)
llm_no_dict_only_mode: false
zero_shot_translation_mode: false
disable_dictionary_stage: false
enable_pos_filter: true
enable_no_dict_detector: true
disable_seed_replacements: false

# Candidate scoring weights / thresholds
keyword_score_weight: 0.9
reading_similarity_weight: 1.2
metadata_weight: 0.7
rule_score_threshold: 2.6
rule_score_margin: 0.35
rule_min_reading_similarity: 0.45
recheck_max_candidates: 3
recheck_min_score_to_call: 2.15

# AI recheck branch
llm_recheck_system_prompt: |
  あなたはASR同音異義語修正の判定器です。
  入力で与えられた候補から、KEEPまたは候補語1つだけを返してください。
  説明文は禁止です。

# No-dict branch
no_dict_prompt: |
  あなたは、カスタマーサービスおよびビジネスの電話会話向けの日本語ASR（音声認識）ポストエディット・アシスタントです。

  あなたのタスクは、入力文の明らかなASR認識エラーのみを修正することです。

  ルール:
  - 最小限の必要な修正のみを行ってください。
  - 元の意味、トーン、丁寧さのレベル、文の構造を維持してください。
  - スタイル（文体）を目的とした書き換えは禁止です。
  - 言い換え（パラフレーズ）は禁止です。
  - 要約は禁止です。
  - 入力から強く暗示されていない限り、欠落している情報を追加しないでください。
  - 元の言い回しがすでに許容範囲内である場合、過度に標準化（正規化）しないでください。
  - 固有名詞、名前、数字、日付、住所、会社名、専門用語は、エラーが明らかでない限り変更しないでください。
  - 不確かな修正を加えるよりも、テキストを変更せずに残すことを優先してください。
  - 以下の様な、音声的・文脈的な証拠から確信度が高いエラーのみを修正してください：
    - 同音異義語・類似音語の誤り
    - 漢字の誤変換
    - ASRに起因する不自然な単語の形成
    - 明らかなASRアーティファクト（不要なノイズや語）
  - 曖昧で明らかに間違っていない箇所は、そのまま維持してください。

  出力フォーマット:
  - 最終的な修正文のみを1行で返してください。
  - 説明は出力しないでください。
  - 引用符は出力しないでください。
  - 明らかな修正が必要ない場合は、空文字列（空白）を返してください。

  入力: {input_sentence}

no_dict_min_reading_similarity: 0.62
no_dict_sentence_max_edit_chars: 8
no_dict_max_completion_tokens: 800
no_dict_reasoning_max_completion_tokens: 1000
no_dict_temperature: 0.0
no_dict_top_p: 0.3
no_dict_token_boundary_check: true

# Auto-learn and runtime memory
auto_learn_dictionary: false
auto_learn_apply_on_verified_hits: false
use_verified_runtime_map: false
verified_runtime_path: result/runtime_verified_map_homophone.json
runtime_map_blacklist_path: result/runtime_blacklist_homophone.jsonl

